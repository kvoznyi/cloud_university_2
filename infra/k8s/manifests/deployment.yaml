apiVersion: apps/v1
kind: Deployment
metadata:
  name: workout-planner-web
  namespace: workout-planner
  labels:
    app: workout-planner
    component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: workout-planner
      component: web
  template:
    metadata:
      labels:
        app: workout-planner
        component: web
    spec:
      containers:
        - name: web
          image: <ACR_LOGIN_SERVER>/workoutplanner:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: MlApi__BaseUrl
              value: "http://workout-planner-ml:5000"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workout-planner-ml
  namespace: workout-planner
  labels:
    app: workout-planner
    component: ml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workout-planner
      component: ml
  template:
    metadata:
      labels:
        app: workout-planner
        component: ml
    spec:
      containers:
        - name: ml
          image: <ACR_LOGIN_SERVER>/workoutplanner-ml:latest
          ports:
            - containerPort: 5000
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
